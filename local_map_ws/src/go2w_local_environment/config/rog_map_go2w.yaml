# Load this file inside a ROG-Map node named "rog_map_node", for example
# with a <rosparam> tag nested in that <node>. The topic defaults in
# projector.yaml assume that node name.
rog_map:
  resolution: 0.05
  inflation_resolution: 0.2
  inflation_step: 1
  unk_inflation_en: false
  unk_inflation_step: 1
  # Robot-centered local volume. Keep only a 10 m x 10 m horizontal area.
  map_size: [10, 10, 5]
  fix_map_origin: [0, 0, 0]
  frontier_extraction_en: false

  virtual_ceil_height: 9999
  virtual_ground_height: -9999
  load_pcd_en: false

  map_sliding:
    enable: true
    threshold: 0.3

  esdf:
    enable: false
    resolution: 0.1
    local_update_box: [5, 5, 3]

  ros_callback:
    enable: true
    cloud_topic: /cloud_registered
    odom_topic: /Odometry
    odom_timeout: 1.0
    # Match each registered cloud to odometry by message timestamp. The sensor
    # origin is the XT16 origin expressed in the FAST-LIO body/IMU frame and
    # must stay consistent with FAST_LIO/config/xt16.yaml extrinsic_T.
    pose_sync_tolerance: 0.05
    odom_history_duration: 2.0
    sensor_origin_in_body: [0.171, 0.0, 0.0908]
    publish_tf: false
    body_frame_id: base_link

  visualization:
    enable: true
    use_dynamic_reconfigure: false
    time_rate: 5
    frame_rate: 0
    range: [10, 10, 4]
    frame_id: odom
    # Required by the projection node to distinguish known free voxels
    # from unknown voxels.
    pub_unknown_map_en: true

  intensity_thresh: -10
  # Keep every second registered point before endpoint-voxel deduplication.
  # Multi-frame probability fusion recovers coverage while bounding the
  # per-frame ray count on the edge computer.
  point_filt_num: 2

  # Keep disabled until the Go2W body bounds relative to base_link have been
  # measured on the real platform. When enabled, points inside this box are
  # removed before raycasting.
  self_filter:
    enable: false
    min: [-0.45, -0.30, -0.35]
    max: [0.45, 0.30, 0.30]

  raycasting:
    enable: true
    batch_update_size: 1
    # At most one correlated hit/miss contribution per voxel and cloud.
    max_hit_updates_per_batch: 1
    max_miss_updates_per_batch: 1
    local_update_box: [10, 10, 5]
    # FAST-LIO may retain farther points for localization, but ROG-Map ignores
    # endpoints farther than 12 m from the lidar origin.
    ray_range: [0.5, 12.0]
    p_min: 0.12
    # Three independent free-space observations confirm a new free voxel;
    # three free frames also remove the occupied state produced by one hit.
    p_miss: 0.45
    p_free: 0.40
    p_occ: 0.85
    p_hit: 0.9
    p_max: 0.98
    unk_thresh: 1.0
